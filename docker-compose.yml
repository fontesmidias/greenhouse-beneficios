version: "3.8"

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: greenhouse-beneficios
    restart: unless-stopped
    # Expose porta removido para evitar colisão na VPS. O Traefik roteia via rede docker interna.
    expose:
      - "3000"
    networks:
      - traefik-public # Ajuste o nome caso sua rede do Traefik seja diferente (ex: web, proxy, etc)
      - default
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.greenhouse-beneficios.rule=Host(`beneficios.unibot.com.br`)"
      - "traefik.http.routers.greenhouse-beneficios.entrypoints=websecure"
      - "traefik.http.routers.greenhouse-beneficios.tls.certresolver=letsencrypt" # Ou nome do seu resolver
      - "traefik.http.services.greenhouse-beneficios.loadbalancer.server.port=3000"
    volumes:
      - greenhouse_data:/app/data
      - greenhouse_uploads:/app/uploads
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_BASE_URL=https://beneficios.unibot.com.br
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - EVO_SERVER_URL=${EVO_SERVER_URL}
      - EVO_GLOBAL_KEY=${EVO_GLOBAL_KEY}
      - EVO_INSTANCE_NAME=${EVO_INSTANCE_NAME}

volumes:
  greenhouse_data:
  greenhouse_uploads:

networks:
  traefik-public:
    external: true
