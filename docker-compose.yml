version: "3.7"

services:
  # 1. Aplicação Principal GreenHouse
  web:
    image: ghcr.io/fontesmidias/greenhouse-beneficios:latest
    networks:
      - unibotnet
    volumes:
      - greenhouse_uploads:/app/uploads
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_BASE_URL=https://${DOMAIN}
      # Conexão interna apontando para o serviço de banco 'db'
      - DATABASE_URL=postgresql://greenhouseAdmin:${DB_PASSWORD}@db:5432/greenhouse_db?schema=public
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - NEXTAUTH_URL=https://${DOMAIN}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - EVO_SERVER_URL=${EVO_SERVER_URL}
      - EVO_GLOBAL_KEY=${EVO_GLOBAL_KEY}
      - EVO_INSTANCE_NAME=${EVO_INSTANCE_NAME}
    deploy:
      mode: replicated
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      labels:
        - "traefik.enable=true"
        - "traefik.docker.network=unibotnet"
        - "traefik.http.routers.greenhouse-beneficios.rule=Host(`${DOMAIN}`)"
        - "traefik.http.routers.greenhouse-beneficios.entrypoints=websecure"
        - "traefik.http.routers.greenhouse-beneficios.tls.certresolver=letsencryptresolver"
        - "traefik.http.routers.greenhouse-beneficios.service=greenhouse-beneficios"
        - "traefik.http.services.greenhouse-beneficios.loadbalancer.server.port=3000"
    depends_on:
      - db

  # 2. Banco de Dados PostgreSQL Específico do GreenHouse
  db:
    image: postgres:15-alpine
    networks:
      - unibotnet
    environment:
      - POSTGRES_USER=greenhouseAdmin
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=greenhouse_db
    volumes:
      - greenhouse_pg_data:/var/lib/postgresql/data
    deploy:
      restart_policy:
        condition: on-failure

  # 3. Backup automático do PostgreSQL
  # Imagem padrão de mercado: prodrigestivill/postgres-backup-local
  # Faz pg_dump agendado, comprime gzip, mantém rotação diária/semanal/mensal.
  # Restore documentado em docs/RESTORE.md
  db-backup:
    image: prodrigestivill/postgres-backup-local:15
    networks:
      - unibotnet
    volumes:
      - greenhouse_pg_backups:/backups
    environment:
      POSTGRES_HOST: db
      POSTGRES_DB: greenhouse_db
      POSTGRES_USER: greenhouseAdmin
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_EXTRA_OPTS: "-Z 6 --schema=public --blobs"
      SCHEDULE: "@daily"
      BACKUP_KEEP_DAYS: 14
      BACKUP_KEEP_WEEKS: 8
      BACKUP_KEEP_MONTHS: 12
      HEALTHCHECK_PORT: 8080
    deploy:
      restart_policy:
        condition: on-failure
    depends_on:
      - db

  # 4. Backup OFFSITE para Backblaze B2 (opcional)
  # Sincroniza /backups (volume local de dumps) → bucket B2 a cada hora.
  # Só ativa se as env B2_* estiverem preenchidas no .env. Caso contrário,
  # o container loga erro e fica reiniciando — comente este service inteiro
  # se ainda não tiver conta B2 configurada.
  # Setup: docs/OFFSITE_BACKUP.md
  db-backup-offsite:
    image: rclone/rclone:latest
    networks:
      - unibotnet
    volumes:
      - greenhouse_pg_backups:/data/backups:ro
    environment:
      RCLONE_CONFIG_B2_TYPE: b2
      RCLONE_CONFIG_B2_ACCOUNT: ${B2_ACCOUNT_ID}
      RCLONE_CONFIG_B2_KEY: ${B2_APPLICATION_KEY}
      RCLONE_CONFIG_B2_HARD_DELETE: "true"
    entrypoint: /bin/sh
    command:
      - -c
      - |
        echo "Sync de backups DB → B2 ativo. Intervalo: 1h."
        while true; do
          echo "[$(date -Iseconds)] Iniciando sync para b2:${B2_BUCKET}/greenhouse-pg-backups"
          rclone sync /data/backups b2:${B2_BUCKET}/greenhouse-pg-backups \
            --transfers 4 --checkers 8 --log-level INFO || echo "Sync falhou — tentaremos de novo em 1h"
          echo "[$(date -Iseconds)] Sync concluído. Dormindo 1h."
          sleep 3600
        done
    deploy:
      restart_policy:
        condition: on-failure
    depends_on:
      - db-backup

  # 5. Portainer Exclusivo desta Aplicação (Porta 9005 e 9445)
  portainer-greenhouse:
    image: portainer/portainer-ce:latest
    command: -H unix:///var/run/docker.sock
    networks:
      - unibotnet
    ports:
      # Expondo na porta 9005 (HTTP) e 9445 (HTTPS) para não conflitar com o seu Portainer principal (9000/9443)
      - "9005:9000"
      - "9445:9443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_greenhouse_data:/data
    deploy:
      restart_policy:
        condition: any

volumes:
  greenhouse_pg_data:
  greenhouse_pg_backups:
  greenhouse_uploads:
  portainer_greenhouse_data:

networks:
  unibotnet:
    external: true
    name: unibotnet
